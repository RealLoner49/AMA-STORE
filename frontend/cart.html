<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - AMA STORE</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="shop.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-left">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="shop.html">Shop</a>
                <a class="nav-link" href="Lookbook.html">Lookbook</a>
                <a class="nav-link" href="support.html">Support</a>
            </div>

            <div class="nav-center">
                <a class="logo" href="index.html">
                    <img src="./Imgs/LOGO.jpeg" alt="AMA STORE Logo" class="logo-img">
                </a>
            </div>

            <div class="nav-right">
                <a class="cart" href="login.html" data-auth-link>Login</a>
                <a class="cart" href="cart.html">Cart</a>
            </div>

            <button class="hamburger" id="hamburger" type="button" aria-label="Open menu" aria-controls="mobileMenu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>

        <div class="mobile-menu" id="mobileMenu">
            <a class="mobile-nav-link" href="index.html">Home</a>
            <a class="mobile-nav-link" href="shop.html">Shop</a>
            <a class="mobile-nav-link" href="Lookbook.html">Lookbook</a>
            <a class="mobile-nav-link" href="support.html">Support</a>
            <a class="mobile-nav-link" href="login.html" data-auth-link>Login</a>
            <a class="mobile-nav-link" href="cart.html">Cart</a>
        </div>
    </header>

    <section class="shop-hero">
        <h1>CART</h1>
        <p>Your selected AMA STORE pieces will appear here</p>
    </section>

    <section class="cart-section">
        <div class="cart-layout" data-cart-root>
            <p class="products-empty">Loading cart...</p>
        </div>
    </section>

    <footer class="site-footer">
        <div class="footer-main">
            <div class="footer-brand">
                <a class="footer-logo" href="index.html">
                    <img src="./Imgs/LOGO.jpeg" alt="AMA STORE Logo">
                </a>
                <h2>AMA STORE</h2>
                <p>Premium activewear made for movement, comfort, and clean everyday styling.</p>
            </div>
        </div>
    </footer>

    <script src="session.js"></script>
    <script src="cart.js"></script>
    <script>
        const hamburger = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobileMenu');

        hamburger.addEventListener('click', () => {
            const isOpen = mobileMenu.classList.toggle('is-open');
            hamburger.classList.toggle('is-open', isOpen);
            document.querySelector('header').classList.toggle('menu-open', isOpen);
            hamburger.setAttribute('aria-expanded', String(isOpen));
            hamburger.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
        });
    </script>
</body>
</html>
