<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AMA STORE</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-visual">
            <img src="./Imgs/LOGO.jpeg" alt="AMA STORE Logo">
        </section>

        <section class="auth-panel">
            <a class="auth-logo" href="index.html">
                <img src="./Imgs/LOGO.jpeg" alt="AMA STORE Logo">
            </a>
            <p class="auth-kicker">Welcome Back</p>
            <h1>Login</h1>
            <p class="auth-copy">Access your AMA account. Admin users are sent straight to the dashboard.</p>

            <form class="auth-form" data-login-form>
                <div class="auth-field">
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
                </div>

                <div class="auth-field">
                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="current-password" required>
                </div>

                <button class="auth-button" type="submit">Login</button>
                <p class="auth-message" data-auth-message></p>
            </form>

            <p class="auth-switch">New here? <a href="signup.html">Create account</a></p>
            <a class="auth-home" href="index.html">Back Home</a>
        </section>
    </main>
    <script src="auth.js"></script>
    <script src="session.js"></script>
</body>
</html>
